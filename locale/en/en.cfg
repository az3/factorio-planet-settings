[mod-setting-description]
ps_nauvis_earth=Replace default Nauvis texture with real Earth image from NASA.
ps_cloudiness_nauvis=Amount of cloud texture to be used based off of the alpha channel of the cloud texture for Nauvis.
ps_cloudiness_vulcanus=Amount of cloud texture to be used based off of the alpha channel of the cloud texture for Vulcanus.
ps_cloudiness_gleba=Amount of cloud texture to be used based off of the alpha channel of the cloud texture for Gleba.
ps_cloudiness_fulgora=Amount of cloud texture to be used based off of the alpha channel of the cloud texture for Fulgora.
ps_cloudiness_aquilo=Amount of cloud texture to be used based off of the alpha channel of the cloud texture for Aquilo.
ps_rotation_seconds_nauvis=How many seconds it takes for the planet to do one revolution for Nauvis.
ps_rotation_seconds_vulcanus=How many seconds it takes for the planet to do one revolution for Vulcanus.
ps_rotation_seconds_gleba=How many seconds it takes for the planet to do one revolution for Gleba.
ps_rotation_seconds_fulgora=How many seconds it takes for the planet to do one revolution for Fulgora.
ps_rotation_seconds_aquilo=How many seconds it takes for the planet to do one revolution for Aquilo.
ps_atmosphere_color_nauvis=Color of atmospheric light for Nauvis.
ps_atmosphere_color_vulcanus=Color of atmospheric light for Vulcanus.
ps_atmosphere_color_gleba=Color of atmospheric light for Gleba.
ps_atmosphere_color_fulgora=Color of atmospheric light for Fulgora.
ps_atmosphere_color_aquilo=Color of atmospheric light for Aquilo.
ps_cloud_flow_intensity_nauvis=Intensity of the flow map effect which begins to degenerate at high values for Nauvis.
ps_cloud_flow_intensity_vulcanus=Intensity of the flow map effect which begins to degenerate at high values for Vulcanus.
ps_cloud_flow_intensity_gleba=Intensity of the flow map effect which begins to degenerate at high values for Gleba.
ps_cloud_flow_intensity_fulgora=Intensity of the flow map effect which begins to degenerate at high values for Fulgora.
ps_cloud_flow_intensity_aquilo=Intensity of the flow map effect which begins to degenerate at high values for Aquilo.
ps_cloud_panning_rate_nauvis=Rotational speed of the clouds laterally across the planet relative to rotation_seconds of the planet. -1.0 means it counteracts the rotation rate and makes clouds remain in place. 0.0 means it drifts along with planet surface.
ps_cloud_panning_rate_vulcanus=Rotational speed of the clouds laterally across the planet relative to rotation_seconds of the planet. -1.0 means it counteracts the rotation rate and makes clouds remain in place. 0.0 means it drifts along with planet surface.
ps_cloud_panning_rate_gleba=Rotational speed of the clouds laterally across the planet relative to rotation_seconds of the planet. -1.0 means it counteracts the rotation rate and makes clouds remain in place. 0.0 means it drifts along with planet surface.
ps_cloud_panning_rate_fulgora=Rotational speed of the clouds laterally across the planet relative to rotation_seconds of the planet. -1.0 means it counteracts the rotation rate and makes clouds remain in place. 0.0 means it drifts along with planet surface.
ps_cloud_panning_rate_aquilo=Rotational speed of the clouds laterally across the planet relative to rotation_seconds of the planet. -1.0 means it counteracts the rotation rate and makes clouds remain in place. 0.0 means it drifts along with planet surface.
ps_surface_vertical_offset_nauvis=How far below the atmosphere layer should the surface be for Nauvis.
ps_surface_vertical_offset_vulcanus=How far below the atmosphere layer should the surface be for Vulcanus.
ps_surface_vertical_offset_gleba=How far below the atmosphere layer should the surface be for Gleba.
ps_surface_vertical_offset_fulgora=How far below the atmosphere layer should the surface be for Fulgora.
ps_surface_vertical_offset_aquilo=How far below the atmosphere layer should the surface be for Aquilo.
ps_cloud_vertical_offset_nauvis=How far below the atmosphere layer should the clouds be for Nauvis.
ps_cloud_vertical_offset_vulcanus=How far below the atmosphere layer should the clouds be for Vulcanus.
ps_cloud_vertical_offset_gleba=How far below the atmosphere layer should the clouds be for Gleba.
ps_cloud_vertical_offset_fulgora=How far below the atmosphere layer should the clouds be for Fulgora.
ps_cloud_vertical_offset_aquilo=How far below the atmosphere layer should the clouds be for Aquilo.

