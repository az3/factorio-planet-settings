ps_position_vulcanus=Tilt and Pitch of the planet position for Vulcanus.
ps_position_gleba=Tilt and Pitch of the planet position for Gleba.
ps_position_fulgora=Tilt and Pitch of the planet position for Fulgora.
ps_position_aquilo=Tilt and Pitch of the planet position for Aquilo.
ps_parallax_strength_nauvis=How strongly the planet moves with camera. {1.0, 1.0} means it tracks the starfield. {0.0, 0.0} means it tracks the foreground tiles for Nauvis.
ps_parallax_strength_vulcanus=How strongly the planet moves with camera. {1.0, 1.0} means it tracks the starfield. {0.0, 0.0} means it tracks the foreground tiles for Vulcanus.
ps_parallax_strength_gleba=How strongly the planet moves with camera. {1.0, 1.0} means it tracks the starfield. {0.0, 0.0} means it tracks the foreground tiles for Gleba.
ps_parallax_strength_fulgora=How strongly the planet moves with camera. {1.0, 1.0} means it tracks the starfield. {0.0, 0.0} means it tracks the foreground tiles for Fulgora.
ps_parallax_strength_aquilo=How strongly the planet moves with camera. {1.0, 1.0} means it tracks the starfield. {0.0, 0.0} means it tracks the foreground tiles for Aquilo.

