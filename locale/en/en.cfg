[mod-setting-description]
ps_planet_surface_nauvis=Replace default planet surface with real images from Solar System Scope and NASA for Nauvis.
ps_planet_surface_vulcanus=Replace default planet surface with real images from Solar System Scope and NASA for Vulcanus.
ps_planet_surface_gleba=Replace default planet surface with real images from Solar System Scope and NASA for Gleba.
ps_planet_surface_fulgora=Replace default planet surface with real images from Solar System Scope and NASA for Fulgora.
ps_planet_surface_aquilo=Replace default planet surface with real images from Solar System Scope and NASA for Aquilo.
ps_planet_emission_nauvis=Replace planet emission layer for Nauvis.
ps_planet_emission_vulcanus=Replace planet emission layer for Vulcanus.
ps_planet_emission_gleba=Replace planet emission layer for Gleba.
ps_planet_emission_fulgora=Replace planet emission layer for Fulgora.
ps_planet_emission_aquilo=Replace planet emission layer for Aquilo.
ps_emission_scales_with_shadow_nauvis=When true only the dark side will receive emission for Nauvis.
ps_emission_scales_with_shadow_vulcanus=When true only the dark side will receive emission for Vulcanus.
ps_emission_scales_with_shadow_gleba=When true only the dark side will receive emission for Gleba.
ps_emission_scales_with_shadow_fulgora=When true only the dark side will receive emission for Fulgora.
ps_emission_scales_with_shadow_aquilo=When true only the dark side will receive emission for Aquilo.
ps_planet_reflectivity_nauvis=Glossiness of the surface in red channel for Nauvis.
ps_planet_reflectivity_vulcanus=Glossiness of the surface in red channel for Vulcanus.
ps_planet_reflectivity_gleba=Glossiness of the surface in red channel for Gleba.
ps_planet_reflectivity_fulgora=Glossiness of the surface in red channel for Fulgora.
ps_planet_reflectivity_aquilo=Glossiness of the surface in red channel for Aquilo.
ps_planet_normal_nauvis=Normal map of the surface deforming local sphere normal for Nauvis.
ps_planet_normal_vulcanus=Normal map of the surface deforming local sphere normal for Vulcanus.
ps_planet_normal_gleba=Normal map of the surface deforming local sphere normal for Gleba.
ps_planet_normal_fulgora=Normal map of the surface deforming local sphere normal for Fulgora.
ps_planet_normal_aquilo=Normal map of the surface deforming local sphere normal for Aquilo.
ps_cloudiness_nauvis=Amount of cloud texture to be used based off of the alpha channel of the cloud texture for Nauvis.
ps_cloudiness_vulcanus=Amount of cloud texture to be used based off of the alpha channel of the cloud texture for Vulcanus.
ps_cloudiness_gleba=Amount of cloud texture to be used based off of the alpha channel of the cloud texture for Gleba.
ps_cloudiness_fulgora=Amount of cloud texture to be used based off of the alpha channel of the cloud texture for Fulgora.
ps_cloudiness_aquilo=Amount of cloud texture to be used based off of the alpha channel of the cloud texture for Aquilo.
ps_rotation_seconds_nauvis=How many seconds it takes for the planet to do one revolution for Nauvis.
ps_rotation_seconds_vulcanus=How many seconds it takes for the planet to do one revolution for Vulcanus.
ps_rotation_seconds_gleba=How many seconds it takes for the planet to do one revolution for Gleba.
ps_rotation_seconds_fulgora=How many seconds it takes for the planet to do one revolution for Fulgora.
ps_rotation_seconds_aquilo=How many seconds it takes for the planet to do one revolution for Aquilo.
ps_atmosphere_color_nauvis=Color of atmospheric light for Nauvis.
ps_atmosphere_color_vulcanus=Color of atmospheric light for Vulcanus.
ps_atmosphere_color_gleba=Color of atmospheric light for Gleba.
ps_atmosphere_color_fulgora=Color of atmospheric light for Fulgora.
ps_atmosphere_color_aquilo=Color of atmospheric light for Aquilo.
ps_cloud_flow_intensity_nauvis=Intensity of the flow map effect which begins to degenerate at high values for Nauvis.
ps_cloud_flow_intensity_vulcanus=Intensity of the flow map effect which begins to degenerate at high values for Vulcanus.
ps_cloud_flow_intensity_gleba=Intensity of the flow map effect which begins to degenerate at high values for Gleba.
ps_cloud_flow_intensity_fulgora=Intensity of the flow map effect which begins to degenerate at high values for Fulgora.
ps_cloud_flow_intensity_aquilo=Intensity of the flow map effect which begins to degenerate at high values for Aquilo.
ps_cloud_panning_rate_nauvis=Rotational speed of the clouds laterally across the planet relative to rotation_seconds of the planet. -1.0 means it counteracts the rotation rate and makes clouds remain in place. 0.0 means it drifts along with planet surface for Nauvis.
ps_cloud_panning_rate_vulcanus=Rotational speed of the clouds laterally across the planet relative to rotation_seconds of the planet. -1.0 means it counteracts the rotation rate and makes clouds remain in place. 0.0 means it drifts along with planet surface for Vulcanus.
ps_cloud_panning_rate_gleba=Rotational speed of the clouds laterally across the planet relative to rotation_seconds of the planet. -1.0 means it counteracts the rotation rate and makes clouds remain in place. 0.0 means it drifts along with planet surface for Gleba.
ps_cloud_panning_rate_fulgora=Rotational speed of the clouds laterally across the planet relative to rotation_seconds of the planet. -1.0 means it counteracts the rotation rate and makes clouds remain in place. 0.0 means it drifts along with planet surface for Fulgora.
ps_cloud_panning_rate_aquilo=Rotational speed of the clouds laterally across the planet relative to rotation_seconds of the planet. -1.0 means it counteracts the rotation rate and makes clouds remain in place. 0.0 means it drifts along with planet surface for Aquilo.
ps_surface_vertical_offset_nauvis=How far below the atmosphere layer should the surface be for Nauvis.
ps_surface_vertical_offset_vulcanus=How far below the atmosphere layer should the surface be for Vulcanus.
ps_surface_vertical_offset_gleba=How far below the atmosphere layer should the surface be for Gleba.
ps_surface_vertical_offset_fulgora=How far below the atmosphere layer should the surface be for Fulgora.
ps_surface_vertical_offset_aquilo=How far below the atmosphere layer should the surface be for Aquilo.
ps_cloud_vertical_offset_nauvis=How far below the atmosphere layer should the clouds be for Nauvis.
ps_cloud_vertical_offset_vulcanus=How far below the atmosphere layer should the clouds be for Vulcanus.
ps_cloud_vertical_offset_gleba=How far below the atmosphere layer should the clouds be for Gleba.
ps_cloud_vertical_offset_fulgora=How far below the atmosphere layer should the clouds be for Fulgora.
ps_cloud_vertical_offset_aquilo=How far below the atmosphere layer should the clouds be for Aquilo.
ps_light_radius_nauvis=Perceived size of the light. Also affects size of the specular spot for Nauvis.
ps_light_radius_vulcanus=Perceived size of the light. Also affects size of the specular spot for Vulcanus.
ps_light_radius_gleba=Perceived size of the light. Also affects size of the specular spot for Gleba.
ps_light_radius_fulgora=Perceived size of the light. Also affects size of the specular spot for Fulgora.
ps_light_radius_aquilo=Perceived size of the light. Also affects size of the specular spot for Aquilo.
ps_planet_axis_nauvis=Tilt and Pitch of the planet axis for Nauvis.
ps_planet_axis_vulcanus=Tilt and Pitch of the planet axis for Vulcanus.
ps_planet_axis_gleba=Tilt and Pitch of the planet axis for Gleba.
ps_planet_axis_fulgora=Tilt and Pitch of the planet axis for Fulgora.
ps_planet_axis_aquilo=Tilt and Pitch of the planet axis for Aquilo.
ps_planet_axis_deviation_amplitude_nauvis=Tilt and Pitch of the planet axis vary over time for Nauvis.
ps_planet_axis_deviation_amplitude_vulcanus=Tilt and Pitch of the planet axis vary over time for Vulcanus.
ps_planet_axis_deviation_amplitude_gleba=Tilt and Pitch of the planet axis vary over time for Gleba.
ps_planet_axis_deviation_amplitude_fulgora=Tilt and Pitch of the planet axis vary over time for Fulgora.
ps_planet_axis_deviation_amplitude_aquilo=Tilt and Pitch of the planet axis vary over time for Aquilo.
ps_planet_axis_deviation_seconds_nauvis=Number of seconds it takes for tilt and pitch to complete one cycle of deviation for Nauvis.
ps_planet_axis_deviation_seconds_vulcanus=Number of seconds it takes for tilt and pitch to complete one cycle of deviation for Vulcanus.
ps_planet_axis_deviation_seconds_gleba=Number of seconds it takes for tilt and pitch to complete one cycle of deviation for Gleba.
ps_planet_axis_deviation_seconds_fulgora=Number of seconds it takes for tilt and pitch to complete one cycle of deviation for Fulgora.
ps_planet_axis_deviation_seconds_aquilo=Number of seconds it takes for tilt and pitch to complete one cycle of deviation for Aquilo.
ps_light_direction_nauvis=Light Direction for Nauvis.
ps_light_direction_vulcanus=Light Direction for Vulcanus.
ps_light_direction_gleba=Light Direction for Gleba.
ps_light_direction_fulgora=Light Direction for Fulgora.
ps_light_direction_aquilo=Light Direction for Aquilo.
ps_light_color_nauvis=Color of light. Multiplied by 10 in shader for Nauvis.
ps_light_color_vulcanus=Color of light. Multiplied by 10 in shader for Vulcanus.
ps_light_color_gleba=Color of light. Multiplied by 10 in shader for Gleba.
ps_light_color_fulgora=Color of light. Multiplied by 10 in shader for Fulgora.
ps_light_color_aquilo=Color of light. Multiplied by 10 in shader for Aquilo.
ps_specular_color_nauvis=Color of Specular Light. Multiplied by 10 in shader for Nauvis.
ps_specular_color_vulcanus=Color of Specular Light. Multiplied by 10 in shader for Vulcanus.
ps_specular_color_gleba=Color of Specular Light. Multiplied by 10 in shader for Gleba.
ps_specular_color_fulgora=Color of Specular Light. Multiplied by 10 in shader for Fulgora.
ps_specular_color_aquilo=Color of Specular Light. Multiplied by 10 in shader for Aquilo.
